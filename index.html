<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sankalpa心念 - 疗愈音乐空间</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
            --text-main: #5d4037; /* 巧克力深咖色，更有质感 */
            --accent: #d4a373;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "PingFang SC", "Quicksand", sans-serif;
            background: #fdfaf5; /* 柔和的底色 */
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Banner 零裁切响应式逻辑 --- */
        .banner-container {
            width: 100%;
            line-height: 0; /* 消除图片下方的间隙 */
        }
        .banner-img {
            width: 100%;
            height: auto; /* 保证不裁切，100%展示 */
            display: block;
        }
        /* 电脑看 pc 图，手机看 m 图 */
        .pc-banner { display: block; }
        .mobile-banner { display: none; }

        @media (max-width: 768px) {
            .pc-banner { display: none; }
            .mobile-banner { display: block; }
        }

        /* --- 容器布局 --- */
        .container {
            max-width: 1200px;
            width: 90%;
            padding: 40px 0 120px 0;
            display: grid;
            /* 电脑端 5 列布局 */
            grid-template-columns: repeat(5, 1fr);
            gap: 25px;
        }

        @media (max-width: 1024px) {
            grid-template-columns: repeat(2, 1fr); /* 平板 2 列 */
        }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; } /* 手机 1 列 */
        }

        /* --- 毛玻璃卡片设计 --- */
        .music-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(0,0,0,0.05);
        }

        .music-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.1);
        }

        .cover-box {
            width: 100%;
            aspect-ratio: 1 / 1; /* 绝对正方形托盘 */
            overflow: hidden;
        }

        .cover-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .music-card:hover .cover-img {
            transform: scale(1.08);
        }

        .info {
            padding: 15px;
            text-align: center;
        }

        .title {
            font-size: 0.95em;
            font-weight: 400;
            letter-spacing: 1px;
            line-height: 1.5;
            min-height: 3em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- 底部悬浮播放器 --- */
        .player-bar {
            position: fixed;
            bottom: 20px;
            width: 90%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 100px;
            padding: 12px 25px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            z-index: 1000;
        }

        #currentPlaying {
            font-size: 0.8em;
            color: var(--text-main);
            opacity: 0.8;
        }

        audio {
            width: 100%;
            height: 35px;
            filter: sepia(20%) saturate(70%) hue-rotate(10deg); /* 调色至巧克力色系 */
        }

        .active-card {
            border: 1.5px solid var(--accent);
            background: rgba(212, 163, 115, 0.1);
        }
    </style>
</head>
<body>

<div class="banner-container">
    <img src="banner-pc.jpg" class="banner-img pc-banner" alt="sankalpa pc">
    <img src="banner-m.jpg" class="banner-img mobile-banner" alt="sankalpa mobile">
</div>

<div class="container" id="musicList">
    </div>

<div class="player-bar">
    <div id="currentPlaying">请选择曲目，开启心念之旅</div>
    <audio id="mainPlayer" controls></audio>
</div>

<script>
    const baseUrl = "https://sankalpamusic-1301330489.cos.ap-guangzhou.myqcloud.com/";
    
    const songs = [
        { id: 1, title: "【432Hz步入灵境】西藏禅宗声音疗愈" },
        { id: 2, title: "432Hz-宇宙和谐治愈震动-提升Energy" },
        { id: 3, title: "528Hz盖亚之爱：疗愈心轮拥抱爱与慈悲" },
        { id: 4, title: "528Hz-内心深处的和平与平静" },
        { id: 5, title: "【灵气音乐】长笛与颂钵，内心的平静与和谐" },
        { id: 6, title: "528Hz内在疗愈-你所渴望的早已属于你" },
        { id: 7, title: "【爱的频率】拥抱你的內在小孩-自我接纳" },
        { id: 8, title: "888Hz-显化丰盛" },
        { id: 9, title: "528Hz-DNA修复频率：唤醒治愈力量" },
        { id: 10, title: "396Hz-平静的声音治愈-放下所有忧虑" }
    ];

    const musicList = document.getElementById('musicList');
    const player = document.getElementById('mainPlayer');
    const playingText = document.getElementById('currentPlaying');

    songs.forEach(song => {
        const card = document.createElement('div');
        card.className = 'music-card';
        card.innerHTML = `
            <div class="cover-box">
                <img src="cover${song.id}.jpg" class="cover-img">
            </div>
            <div class="info">
                <div class="title">${song.title}</div>
            </div>
        `;
        card.onclick = () => {
            player.src = `${baseUrl}${song.id}.mp3`;
            player.play();
            playingText.innerText = `正在播放: ${song.title}`;
            
            // 处理高亮
            document.querySelectorAll('.music-card').forEach(c => c.classList.remove('active-card'));
            card.classList.add('active-card');
        };
        musicList.appendChild(card);
    });
</script>

</body>
</html>
