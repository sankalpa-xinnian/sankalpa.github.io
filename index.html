<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sankalpa心念 - 疗愈音乐空间</title>
    <style>
        :root { --accent: #d4a373; --bg: #fefae0; }
        body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background-color: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; }
        .banner { width: 100%; max-height: 400px; overflow: hidden; position: relative; }
        .banner img { width: 100%; height: 100%; object-fit: cover; }
        .logo-text { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: white; font-size: 2.5em; letter-spacing: 5px; text-shadow: 0 2px 10px rgba(0,0,0,0.3); font-weight: 300; }
        .container { max-width: 1000px; padding: 40px 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 30px; }
        .music-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.3s; cursor: pointer; position: relative; }
        .music-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .cover { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .info { padding: 15px; text-align: center; }
        .title { font-size: 1.1em; color: #606c38; margin-bottom: 5px; }
        .playing-icon { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.8); border-radius: 50%; padding: 5px; display: none; }
        .music-card.active .playing-icon { display: block; }
        .player-bar { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); padding: 15px; box-shadow: 0 -2px 20px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; gap: 20px; }
    </style>
</head>
<body>

<div class="banner">
    <img src="butterfly-banner.jpg" alt="sankalpa">
    <div class="logo-text">sankalpa 心念</div>
</div>

<div class="container" id="musicList">
    </div>

<div class="player-bar">
    <div id="currentTitle" style="color: #606c38;">请选择曲目...</div>
    <audio id="audioPlayer" controls></audio>
</div>

<script>
    // 这是你的腾讯云基础地址（不带数字和后缀的部分）
    const baseUrl = "https://sankalpamusic-1301330489.cos.ap-guangzhou.myqcloud.com/";
    
    const songs = [
        { id: 1, title: "静谧森林" }, { id: 2, title: "晨间呼吸" },
        { id: 3, title: "流水禅心" }, { id: 4, title: "星空冥想" },
        { id: 5, title: "大地回声" }, { id: 6, title: "心灵净土" },
        { id: 7, title: "温柔海浪" }, { id: 8, title: "月光洗礼" },
        { id: 9, title: "万物生长" }, { id: 10, title: "无限丰盛" },
        { id: 11, title: "内在和平" }, { id: 12, title: "心念合一" }
    ];

    const musicList = document.getElementById('musicList');
    const player = document.getElementById('audioPlayer');
    const currentTitle = document.getElementById('currentTitle');

    songs.forEach(song => {
        const card = document.createElement('div');
        card.className = 'music-card';
        card.innerHTML = `
            <img src="cover${song.id}.jpg" class="cover">
            <div class="info">
                <div class="title">${song.title}</div>
            </div>
            <div class="playing-icon">🎵</div>
        `;
        card.onclick = () => playMusic(song, card);
        musicList.appendChild(card);
    });

    function playMusic(song, card) {
        // 更新播放器地址：使用腾讯云链接
        player.src = `${baseUrl}${song.id}.mp3`;
        player.play();
        currentTitle.innerText = `正在播放: ${song.title}`;
        
        // 视觉反馈
        document.querySelectorAll('.music-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
    }
</script>

</body>
</html>
