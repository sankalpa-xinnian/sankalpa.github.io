<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sankalpa心念 - 疗愈音乐空间</title>
    <style>
        :root {
            --bg-page: #f1ece4;       /* 整体奶茶色底色 */
            --bg-card: #e5ddd3;       /* 样稿中的小麦色卡片底色 */
            --text-main: #3e2723;     /* 深咖色文字 */
            --accent: #a1887f;        
        }

        body {
            margin: 0; padding: 0;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
        }

        .banner-container { width: 100%; line-height: 0; }
        .banner-img { width: 100%; height: auto; display: block; }
        .pc-banner { display: block; }
        .mobile-banner { display: none; }
        @media (max-width: 768px) { .pc-banner { display: none; } .mobile-banner { display: block; } }

        .container {
            max-width: 1200px; width: 90%;
            padding: 40px 0 160px 0;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 25px;
        }
        @media (max-width: 1024px) { .container { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }

        /* --- 极简小麦色卡片 --- */
        .music-card {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 15px 15px 25px 15px; /* 留出精致的边距 */
            display: flex; flex-direction: column;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .music-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(62, 39, 35, 0.1);
        }

        .cover-box {
            width: 100%; aspect-ratio: 1 / 1;
            border-radius: 18px; overflow: hidden;
            position: relative;
            margin-bottom: 15px;
        }

        .cover-img { width: 100%; height: 100%; object-fit: cover; }

        /* --- 图片中心播放按钮 --- */
        .play-hint {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 50px; height: 50px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(4px);
            border: 2px solid rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            z-index: 2;
        }
        .play-hint::after {
            content: '';
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-left: 15px solid white;
            margin-left: 5px;
        }

        .info { text-align: center; }
        .title {
            font-size: 0.95em; font-weight: 700; /* 标题加粗 */
            letter-spacing: 0.5px; line-height: 1.4;
            min-height: 2.8em;
            display: flex; align-items: center; justify-content: center;
        }

        /* --- 底部播放条 --- */
        .player-bar {
            position: fixed; bottom: 25px;
            width: 85%; max-width: 500px;
            background: rgba(229, 221, 211, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(62, 39, 35, 0.1);
            border-radius: 100px;
            padding: 12px 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; align-items: center;
            z-index: 1000;
        }
        #currentPlaying { font-size: 0.8em; font-weight: 700; margin-bottom: 5px; opacity: 0.8; }
        audio { width: 100%; height: 35px; filter: sepia(30%) contrast(90%); }

        .active-card { border: 2px solid var(--text-main); }
    </style>
</head>
<body>

<div class="banner-container">
    <img src="banner-pc.jpg" class="banner-img pc-banner" alt="sankalpa">
    <img src="banner-m.jpg" class="banner-img mobile-banner" alt="sankalpa">
</div>

<div class="container" id="musicList"></div>

<div class="player-bar">
    <div id="currentPlaying">请开启您的心念之旅</div>
    <audio id="mainPlayer" controls></audio>
</div>

<script>
    const baseUrl = "https://sankalpamusic-1301330489.cos.ap-guangzhou.myqcloud.com/";
    const songs = [
        { id: 1, title: "【432Hz步入灵境】西藏禅宗声音疗愈" },
        { id: 2, title: "432Hz-宇宙和谐治愈震动-提升Energy" },
        { id: 3, title: "528Hz盖亚之爱：疗愈心轮拥抱爱与慈悲" },
        { id: 4, title: "528Hz-内心深处的和平与平静" },
        { id: 5, title: "【灵气音乐】长笛与颂钵，内心的平静与和谐" },
        { id: 6, title: "528Hz内在疗愈-你所渴望的早已属于你" },
        { id: 7, title: "【爱的频率】拥抱你的內在小孩-自我接纳" },
        { id: 8, title: "888Hz-显化丰盛" },
        { id: 9, title: "528Hz-DNA修复频率：唤醒治愈力量" },
        { id: 10, title: "396Hz-平静的声音治愈-放下所有忧虑" }
    ];

    const musicList = document.getElementById('musicList');
    const player = document.getElementById('mainPlayer');
    const playingText = document.getElementById('currentPlaying');

    songs.forEach(song => {
        const card = document.createElement('div');
        card.className = 'music-card';
        card.innerHTML = `
            <div class="cover-box">
                <div class="play-hint"></div>
                <img src="cover${song.id}.jpg" class="cover-img">
            </div>
            <div class="info">
                <div class="title">${song.title}</div>
            </div>
        `;
        card.onclick = () => {
            player.src = `${baseUrl}${song.id}.mp3`;
            player.play();
            playingText.innerText = `正在播放: ${song.title}`;
            document.querySelectorAll('.music-card').forEach(c => c.classList.remove('active-card'));
            card.classList.add('active-card');
        };
        musicList.appendChild(card);
    });
</script>
</body>
</html>
