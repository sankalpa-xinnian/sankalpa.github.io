<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sankalpa心念 - 疗愈音乐空间</title>
    <style>
        :root {
            --bg-page: #f1ece4;       /* 奶茶色底色 */
            --bg-card: #e5ddd3;       /* 小麦色卡片色 */
            --text-main: #3e2723;     /* 深咖色文字 */
        }

        body {
            margin: 0; padding: 0;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
        }

        .banner-container { width: 100%; line-height: 0; }
        .banner-img { width: 100%; height: auto; display: block; }
        .pc-banner { display: block; }
        .mobile-banner { display: none; }
        @media (max-width: 768px) { .pc-banner { display: none; } .mobile-banner { display: block; } }

        /* --- 响应式网格布局 --- */
        .container {
            max-width: 1200px; width: 92%;
            padding: 30px 0 150px 0;
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* 电脑端 5 列 */
            gap: 15px;
        }

        @media (max-width: 1024px) {
            .container { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 768px) {
            /* 手机端：一排 2 个，共 5 排 */
            .container { grid-template-columns: repeat(2, 1fr); gap: 12px; }
        }

        /* --- 极简播放器卡片 --- */
        .music-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 12px 12px 20px 12px;
            display: flex; flex-direction: column;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .music-card:active { transform: scale(0.98); }

        .cover-box {
            width: 100%; aspect-ratio: 1 / 1;
            border-radius: 12px; overflow: hidden;
            position: relative;
        }
        .cover-img { width: 100%; height: 100%; object-fit: cover; }

        /* --- 图片中心播放按钮（纯 CSS 绘制，不乱码） --- */
        .play-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 40px; height: 40px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(4px);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .play-overlay::after {
            content: '';
            border-top: 8px solid transparent;
            border-bottom: 8px solid transparent;
            border-left: 12px solid white;
            margin-left: 4px;
        }

        .info { padding-top: 12px; text-align: center; }
        .title {
            font-size: 0.85em; 
            font-weight: 700; /* 加粗 */
            line-height: 1.4;
            min-height: 2.8em;
            display: flex; align-items: center; justify-content: center;
        }

        /* --- 底部播放控件 --- */
        .player-bar {
            position: fixed; bottom: 20px;
            width: 90%; max-width: 500px;
            background: rgba(229, 221, 211, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 100px;
            padding: 10px 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; align-items: center;
            z-index: 1000;
        }
        #currentPlaying { font-size: 0.75em; font-weight: 700; margin-bottom: 5px; }
        audio { width: 100%; height: 32px; filter: sepia(20%); }

        .active-card { outline: 2px solid var(--text-main); }
    </style>
</head>
<body>

<div class="banner-container">
    <img src="banner-pc.jpg" class="banner-img pc-banner" alt="sankalpa">
    <img src="banner-m.jpg" class="banner-img mobile-banner" alt="sankalpa">
</div>

<div class="container" id="musicList"></div>

<div class="player-bar">
    <div id="currentPlaying">sankalpa心念：待开启</div>
    <audio id="mainPlayer" controls></audio>
</div>

<script>
    const baseUrl = "https://sankalpamusic-1301330489.cos.ap-guangzhou.myqcloud.com/";
    const songs = [
        { id: 1, title: "【432Hz步入灵境】西藏禅宗声音疗愈" },
        { id: 2, title: "432Hz-宇宙和谐治愈震动-提升Energy" },
        { id: 3, title: "528Hz盖亚之爱：疗愈心轮拥抱爱与慈悲" },
        { id: 4, title: "528Hz-内心深处的和平与平静" },
        { id: 5, title: "【灵气音乐】长笛与颂钵，内心的平静与和谐" },
        { id: 6, title: "528Hz内在疗愈-你所渴望的早已属于你" },
        { id: 7, title: "【爱的频率】拥抱你的內在小孩-自我接纳" },
        { id: 8, title: "888Hz-显化丰盛" },
        { id: 9, title: "528Hz-DNA修复频率：唤醒治愈力量" },
        { id: 10, title: "396Hz-平静的声音治愈-放下所有忧虑" }
    ];

    const musicList = document.getElementById('musicList');
    const player = document.getElementById('mainPlayer');
    const playingText = document.getElementById('currentPlaying');

    songs.forEach(song => {
        const card = document.createElement('div');
        card.className = 'music-card';
        card.innerHTML = `
            <div class="cover-box">
                <div class="play-overlay"></div>
                <img src="cover${song.id}.jpg" class="cover-img">
            </div>
            <div class="info">
                <div class="title">${song.title}</div>
            </div>
        `;
        card.onclick = () => {
            player.src = `${baseUrl}${song.id}.mp3`;
            player.play();
            playingText.innerText = `正在播放: ${song.title}`;
            document.querySelectorAll('.music-card').forEach(c => c.classList.remove('active-card'));
            card.classList.add('active-card');
        };
        musicList.appendChild(card);
    });
</script>
</body>
</html>
